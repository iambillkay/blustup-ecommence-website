<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin">
  <div class="admin-topbar">
    <div class="admin-title">
      <h1>Admin Dashboard</h1>
      <div class="sub" id="whoami">Loading...</div>
    </div>
    <div class="admin-actions">
      <button class="btn-admin" id="btnHome">View site</button>
      <button class="btn-admin" id="btnRefresh">Refresh</button>
      <button class="btn-admin danger" id="btnLogout">Log out</button>
    </div>
  </div>

  <div class="admin-shell">
    <main class="panel">
      <div class="panel-header">Store</div>
      <div class="section">
        <div class="row-link">
          <a href="#" data-action="list-products">Products</a>
          <div class="controls"><a href="#" data-action="add-product">+ Add</a></div>
        </div>
      </div>

      <div class="panel-header">Shop</div>
      <div class="section">
        <div class="row-link"><a href="#" data-action="edit-shop">Shop title and filters</a></div>
      </div>

      <div class="panel-header">Deals</div>
      <div class="section">
        <div class="row-link"><a href="#" data-action="edit-deals">Simple deals setup</a></div>
      </div>

      <div class="panel-header">Home</div>
      <div class="section">
        <div class="row-link"><a href="#" data-action="edit-home-images">Ad images only</a></div>
      </div>

      <div class="panel-header">AI</div>
      <div class="section">
        <div class="row-link"><a href="#" data-action="edit-ai">AI chatbot and AI search</a></div>
      </div>
    </main>

    <aside class="side">
      <div class="panel">
        <div class="panel-header">Recent actions</div>
        <div class="recent">
          <h3>Admin activity</h3>
          <div id="recentActions" class="muted">Loading...</div>
        </div>
      </div>
    </aside>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Admin modal">
      <div class="modal-top">
        <div class="title" id="modalTitle">Admin</div>
        <button class="btn-admin" id="modalClose">Close</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    function getToken() { return localStorage.getItem("blustup_token"); }
    function clearAuth() { localStorage.removeItem("blustup_token"); localStorage.removeItem("blustup_user"); }
    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      const token = getToken();
      if (token) headers.Authorization = `Bearer ${token}`;
      const res = await fetch(path, { ...options, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Request failed");
      return data;
    }

    async function uploadImage(file) {
      const token = getToken();
      const form = new FormData();
      form.append("image", file);
      const res = await fetch("/api/cms/home/upload-image", {
        method: "POST",
        headers: token ? { Authorization: `Bearer ${token}` } : {},
        body: form,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Upload failed");
      return data.imageUrl;
    }

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    function openModal(title, html) {
      modalTitle.textContent = title;
      modalBody.innerHTML = html;
      modalBackdrop.classList.add("open");
      modalBackdrop.setAttribute("aria-hidden", "false");
    }
    function closeModal() {
      modalBackdrop.classList.remove("open");
      modalBackdrop.setAttribute("aria-hidden", "true");
      modalBody.innerHTML = "";
    }
    function esc(v) {
      return String(v == null ? "" : v).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
    }

    async function loadRecentActions() {
      const el = document.getElementById("recentActions");
      try {
        const { actions } = await api("/api/admin/actions/recent");
        if (!actions?.length) return (el.innerHTML = `<div class="muted">No recent actions yet.</div>`);
        el.innerHTML = actions.map((a) => `
          <div class="item"><div class="meta">
            <div class="what">${esc(a.summary || a.action)}</div>
            <div class="who">${esc(a.actor_email || "unknown")} · ${esc(a.created_at || "")}</div>
          </div></div>`).join("");
      } catch (e) { el.textContent = e.message || "Failed"; }
    }

    // Products
    function productForm(item = {}) {
      return `
        <div class="field"><label>Name</label><input id="f_name" value="${esc(item.name || "")}" /></div>
        <div class="field" style="margin-top:12px;"><label>Description</label><textarea id="f_desc">${esc(item.desc || "")}</textarea></div>
        <div class="grid2" style="margin-top:12px;">
          <div class="field"><label>Category</label><input id="f_cat" value="${esc(item.cat || "general")}" /></div>
          <div class="field"><label>Price</label><input id="f_price" type="number" step="0.01" value="${esc(item.price ?? 0)}" /></div>
        </div>
        <div class="grid2" style="margin-top:12px;">
          <div class="field"><label>Stock Qty</label><input id="f_stock" type="number" value="${esc(item.stockQty ?? 0)}" /></div>
          <div class="field"><label>Image URL</label><input id="f_image" value="${esc(item.imageUrl || "")}" /></div>
        </div>
        <div class="grid2" style="margin-top:12px;">
          <div class="field"><label>Badge</label><input id="f_badge" value="${esc(item.badge || "")}" /></div>
          <div class="field"><label>Old Price</label><input id="f_old_price" type="number" step="0.01" value="${esc(item.oldPrice ?? "")}" /></div>
        </div>
        <div class="field" style="margin-top:12px;"><label>Active</label>
          <select id="f_active"><option value="1" ${item.isActive !== false ? "selected" : ""}>Yes</option><option value="0" ${item.isActive === false ? "selected" : ""}>No</option></select>
        </div>`;
    }
    function getProductPayload() {
      return {
        name: document.getElementById("f_name").value,
        description: document.getElementById("f_desc").value,
        cat: document.getElementById("f_cat").value,
        price: Number(document.getElementById("f_price").value),
        stockQty: Number(document.getElementById("f_stock").value),
        imageUrl: document.getElementById("f_image").value,
        badge: document.getElementById("f_badge").value || null,
        oldPrice: document.getElementById("f_old_price").value || null,
        isActive: document.getElementById("f_active").value === "1",
      };
    }
    async function openProductsTable() {
      const { products } = await api("/api/products/admin");
      openModal("Products", `
        <table class="admin-table">
          <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Image</th><th>Actions</th></tr></thead>
          <tbody>${products.map((p) => `
            <tr>
              <td>${esc(p.name)}</td><td>${esc(p.cat)}</td><td>$${esc(p.price)}</td>
              <td>${p.imageUrl ? `<img src="${esc(p.imageUrl)}" style="width:44px;height:44px;object-fit:cover;border-radius:8px;">` : "-"}</td>
              <td><a href="#" data-action="edit-product" data-id="${esc(p.id)}">Edit</a> · <a href="#" data-action="delete-product" data-id="${esc(p.id)}">Delete</a></td>
            </tr>`).join("")}</tbody>
        </table>`);
    }
    async function openAddProduct() {
      openModal("Add Product", `${productForm()}<div style="margin-top:14px;"><button class="btn-admin primary" id="btnSaveProduct">Save</button></div>`);
      document.getElementById("btnSaveProduct").addEventListener("click", async () => {
        await api("/api/products/admin", { method: "POST", body: JSON.stringify(getProductPayload()) });
        await loadRecentActions(); closeModal();
      });
    }
    async function openEditProduct(id) {
      const { products } = await api("/api/products/admin");
      const item = products.find((p) => String(p.id) === String(id));
      if (!item) return alert("Product not found");
      openModal("Edit Product", `${productForm(item)}<div style="margin-top:14px;"><button class="btn-admin primary" id="btnSaveProduct">Save</button></div>`);
      document.getElementById("btnSaveProduct").addEventListener("click", async () => {
        await api(`/api/products/admin/${id}`, { method: "PATCH", body: JSON.stringify(getProductPayload()) });
        await loadRecentActions(); closeModal();
      });
    }
    async function deleteProduct(id) {
      if (!confirm("Delete this product?")) return;
      await api(`/api/products/admin/${id}`, { method: "DELETE" });
      await loadRecentActions(); await openProductsTable();
    }

    // Home images only
    async function openHomeImagesCms() {
      const { settings } = await api("/api/cms/home");
      const images = Array.isArray(settings.adImages) ? settings.adImages : [];
      openModal("Home Ad Images", `
        <div class="muted">Home CMS controls only ad images.</div>
        <div id="homeImgsList" style="display:grid;gap:10px;margin-top:10px;">
          ${images.map((img, i) => `
            <div style="display:flex;gap:10px;align-items:center;">
              <img src="${esc(img)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid #e2e7ff;">
              <input data-img-index="${i}" value="${esc(img)}" style="flex:1;" />
            </div>`).join("")}
        </div>
        <div class="field" style="margin-top:12px;"><label>Upload new ad image</label><input id="homeImageFile" type="file" accept="image/*" /></div>
        <div style="margin-top:14px;display:flex;gap:8px;">
          <button class="btn-admin" id="btnUploadHomeImage">Upload</button>
          <button class="btn-admin primary" id="btnSaveHomeImages">Save</button>
        </div>`);

      document.getElementById("btnUploadHomeImage").addEventListener("click", async () => {
        const file = document.getElementById("homeImageFile").files?.[0];
        if (!file) return alert("Choose an image first");
        const imageUrl = await uploadImage(file);
        const list = document.getElementById("homeImgsList");
        const nextIndex = list.querySelectorAll("[data-img-index]").length;
        const row = document.createElement("div");
        row.style.display = "flex"; row.style.gap = "10px"; row.style.alignItems = "center";
        row.innerHTML = `<img src="${esc(imageUrl)}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid #e2e7ff;"><input data-img-index="${nextIndex}" value="${esc(imageUrl)}" style="flex:1;">`;
        list.appendChild(row);
        document.getElementById("homeImageFile").value = "";
      });

      document.getElementById("btnSaveHomeImages").addEventListener("click", async () => {
        const values = Array.from(document.querySelectorAll("[data-img-index]")).map((x) => x.value.trim()).filter(Boolean);
        await api("/api/cms/home", { method: "PUT", body: JSON.stringify({ adImages: values }) });
        await loadRecentActions(); closeModal();
      });
    }

    // Shop filters (structured + add new)
    function renderFilterRows(filters) {
      return filters.map((f, i) => `
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;">
          <input data-filter-row="${i}" data-k="label" placeholder="Label (e.g. Electronics)" value="${esc(f.label)}" />
          <input data-filter-row="${i}" data-k="value" placeholder="Value (e.g. flights)" value="${esc(f.value)}" />
          <button class="btn-admin danger" data-action="remove-filter-row" data-row="${i}">X</button>
        </div>`).join("");
    }
    async function openShopCms() {
      const { settings } = await api("/api/cms/shop");
      const filters = Array.isArray(settings.filters) ? settings.filters : [];
      openModal("Shop Settings", `
        <div class="field"><label>Shop title</label><input id="s_title" value="${esc(settings.title || "")}" /></div>
        <div class="field" style="margin-top:12px;"><label>Shop subtitle</label><input id="s_subtitle" value="${esc(settings.subtitle || "")}" /></div>
        <div class="field" style="margin-top:12px;"><label>Filters</label>
          <div id="filtersWrap" style="margin-top:8px;">${renderFilterRows(filters)}</div>
          <button class="btn-admin" id="btnAddFilterRow" style="margin-top:8px;">+ Add filter</button>
        </div>
        <div style="margin-top:14px;"><button class="btn-admin primary" id="saveShop">Save</button></div>`);

      document.getElementById("btnAddFilterRow").addEventListener("click", () => {
        const wrap = document.getElementById("filtersWrap");
        const next = wrap.querySelectorAll("[data-filter-row]").length;
        const div = document.createElement("div");
        div.style.display = "grid"; div.style.gridTemplateColumns = "1fr 1fr auto"; div.style.gap = "8px"; div.style.alignItems = "center"; div.style.marginBottom = "8px";
        div.innerHTML = `<input data-filter-row="${next}" data-k="label" placeholder="Label"><input data-filter-row="${next}" data-k="value" placeholder="Value"><button class="btn-admin danger" data-action="remove-filter-row" data-row="${next}">X</button>`;
        wrap.appendChild(div);
      });

      document.getElementById("saveShop").addEventListener("click", async () => {
        const rows = Array.from(document.querySelectorAll("[data-filter-row]"));
        const map = {};
        rows.forEach((el) => {
          const r = el.getAttribute("data-filter-row");
          const k = el.getAttribute("data-k");
          if (!map[r]) map[r] = { label: "", value: "" };
          map[r][k] = el.value.trim();
        });
        const nextFilters = Object.values(map).filter((f) => f.label && f.value);
        await api("/api/cms/shop", {
          method: "PUT",
          body: JSON.stringify({
            title: document.getElementById("s_title").value,
            subtitle: document.getElementById("s_subtitle").value,
            filters: nextFilters,
          }),
        });
        await loadRecentActions(); closeModal();
      });
    }

    // Simplified deals with dropdowns sourced from shop filters
    function dealRowTemplate(d, idx, filters) {
      const options = filters.map((f) => `<option value="${esc(f.value)}" ${f.value === d.sourceCategory ? "selected" : ""}>${esc(f.label)} (${esc(f.value)})</option>`).join("");
      const optionsSee = filters.map((f) => `<option value="${esc(f.value)}" ${f.value === d.seeMoreFilter ? "selected" : ""}>${esc(f.label)} (${esc(f.value)})</option>`).join("");
      return `
        <div style="border:1px solid #e7eaff;padding:10px;border-radius:10px;margin-bottom:10px;">
          <div class="grid2">
            <div class="field"><label>Deal name</label><input data-deal="${idx}" data-k="name" value="${esc(d.name)}"></div>
            <div class="field"><label>Timer (seconds)</label><input type="number" data-deal="${idx}" data-k="timerSeconds" value="${esc(d.timerSeconds)}"></div>
          </div>
          <div class="grid2" style="margin-top:8px;">
            <div class="field"><label>Products from filter</label><select data-deal="${idx}" data-k="sourceCategory">${options}</select></div>
            <div class="field"><label>See more goes to filter</label><select data-deal="${idx}" data-k="seeMoreFilter">${optionsSee}</select></div>
          </div>
          <div class="grid2" style="margin-top:8px;">
            <div class="field"><label>Max items</label><input type="number" data-deal="${idx}" data-k="maxItems" value="${esc(d.maxItems || 8)}"></div>
            <div class="field"><label>Active</label><select data-deal="${idx}" data-k="isActive"><option value="1" ${d.isActive ? "selected" : ""}>Yes</option><option value="0" ${!d.isActive ? "selected" : ""}>No</option></select></div>
          </div>
          <input type="hidden" data-deal="${idx}" data-k="id" value="${esc(d.id)}">
          <div style="margin-top:8px;"><button class="btn-admin danger" data-action="remove-deal-row" data-row="${idx}">Remove deal</button></div>
        </div>`;
    }
    async function openDealsCms() {
      const [{ settings: deals }, { settings: shop }] = await Promise.all([api("/api/cms/deals"), api("/api/cms/shop")]);
      const filters = Array.isArray(shop.filters) && shop.filters.length ? shop.filters : [{ label: "All", value: "all" }];
      const rows = Array.isArray(deals) ? deals : [];
      openModal("Deals (simple)", `
        <div class="muted">Each deal selects source filter + where "See All" should go.</div>
        <div id="dealsWrap" style="margin-top:10px;">${rows.map((d, i) => dealRowTemplate(d, i, filters)).join("")}</div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-admin" id="btnAddDeal">+ Add deal</button>
          <button class="btn-admin primary" id="saveDeals">Save Deals</button>
        </div>`);

      document.getElementById("btnAddDeal").addEventListener("click", () => {
        const wrap = document.getElementById("dealsWrap");
        const idx = wrap.querySelectorAll("[data-deal]").length;
        const first = filters[0]?.value || "all";
        const d = { id: `deal-${Date.now()}`, name: "New Deal", timerSeconds: 3600, sourceCategory: first, seeMoreFilter: first, maxItems: 8, isActive: true };
        const div = document.createElement("div");
        div.innerHTML = dealRowTemplate(d, idx, filters);
        wrap.appendChild(div.firstElementChild);
      });

      document.getElementById("saveDeals").addEventListener("click", async () => {
        const nodes = Array.from(document.querySelectorAll("[data-deal]"));
        const map = {};
        nodes.forEach((el) => {
          const i = el.getAttribute("data-deal");
          const k = el.getAttribute("data-k");
          if (!map[i]) map[i] = {};
          map[i][k] = el.value;
        });
        const next = Object.values(map).map((d) => ({
          id: d.id || `deal-${Date.now()}`,
          name: d.name,
          timerSeconds: Number(d.timerSeconds || 0),
          sourceCategory: d.sourceCategory,
          seeMoreFilter: d.seeMoreFilter,
          maxItems: Number(d.maxItems || 8),
          isActive: d.isActive === "1",
        })).filter((d) => d.name && d.timerSeconds > 0 && d.sourceCategory && d.seeMoreFilter);
        await api("/api/cms/deals", { method: "PUT", body: JSON.stringify(next) });
        await loadRecentActions(); closeModal();
      });
    }

    // AI
    async function openAiSettings() {
      const { settings } = await api("/api/cms/ai");
      openModal("AI Settings", `
        <div class="grid2">
          <div class="field"><label>Chat enabled</label><select id="a_chat"><option value="1" ${settings.chatEnabled ? "selected" : ""}>Yes</option><option value="0" ${!settings.chatEnabled ? "selected" : ""}>No</option></select></div>
          <div class="field"><label>Search enabled</label><select id="a_search"><option value="1" ${settings.searchEnabled ? "selected" : ""}>Yes</option><option value="0" ${!settings.searchEnabled ? "selected" : ""}>No</option></select></div>
        </div>
        <div class="field" style="margin-top:12px;"><label>Bot name</label><input id="a_name" value="${esc(settings.botName || "")}" /></div>
        <div class="field" style="margin-top:12px;"><label>System prompt</label><textarea id="a_prompt" rows="8">${esc(settings.systemPrompt || "")}</textarea></div>
        <div style="margin-top:14px;"><button class="btn-admin primary" id="saveAi">Save</button></div>`);
      document.getElementById("saveAi").addEventListener("click", async () => {
        await api("/api/cms/ai", {
          method: "PUT",
          body: JSON.stringify({
            chatEnabled: document.getElementById("a_chat").value === "1",
            searchEnabled: document.getElementById("a_search").value === "1",
            botName: document.getElementById("a_name").value,
            systemPrompt: document.getElementById("a_prompt").value,
          }),
        });
        await loadRecentActions(); closeModal();
      });
    }

    async function init() {
      const me = await api("/api/auth/me");
      if (me.user.role !== "admin") throw new Error("Admin access required");
      document.getElementById("whoami").textContent = `Logged in as ${me.user.email}`;
      await loadRecentActions();
    }

    document.getElementById("modalClose").addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => { if (e.target === modalBackdrop) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

    document.body.addEventListener("click", async (e) => {
      const node = e.target.closest("[data-action]");
      if (!node) return;
      e.preventDefault();
      const action = node.getAttribute("data-action");
      const id = node.getAttribute("data-id");
      const row = node.getAttribute("data-row");

      if (action === "list-products") return openProductsTable();
      if (action === "add-product") return openAddProduct();
      if (action === "edit-product") return openEditProduct(id);
      if (action === "delete-product") return deleteProduct(id);
      if (action === "edit-home-images") return openHomeImagesCms();
      if (action === "edit-shop") return openShopCms();
      if (action === "edit-deals") return openDealsCms();
      if (action === "edit-ai") return openAiSettings();
      if (action === "remove-filter-row" || action === "remove-deal-row") {
        node.closest("div[style*='grid-template-columns'], div[style*='border:1px solid']")?.remove();
        return;
      }
    });

    document.getElementById("btnHome").addEventListener("click", () => window.location.href = "/");
    document.getElementById("btnRefresh").addEventListener("click", () => init().catch((e) => alert(e.message || "Failed")));
    document.getElementById("btnLogout").addEventListener("click", () => { clearAuth(); window.location.href = "/"; });

    init().catch((e) => { document.getElementById("whoami").textContent = e.message || "Failed to load admin"; });
  </script>
</body>
</html>
