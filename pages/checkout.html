<!-- ═══════════════════════════════════════
     pages/checkout.html — Checkout Page Content
     Included inside #page-checkout in index.html
════════════════════════════════════════ -->

<div class="checkout-container">
  <h1>Checkout</h1>

  <!-- Progress Steps -->
  <div class="checkout-steps">
    <div class="step done"><div class="step-num">✓</div>Cart</div>
    <div class="step-divider"></div>
    <div class="step active"><div class="step-num">2</div>Details</div>
    <div class="step-divider"></div>
    <div class="step"><div class="step-num">3</div>Payment</div>
    <div class="step-divider"></div>
    <div class="step"><div class="step-num">4</div>Confirm</div>
  </div>

  <div class="checkout-layout">

    <!-- Form -->
    <div class="checkout-form-wrap">

      <!-- Contact Info -->
      <div class="form-section">
        <h3><span class="sec-icon">👤</span>Contact Information</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" placeholder="+1 (555) 000-0000">
          </div>
        </div>
      </div>

      <!-- Billing Address -->
      <div class="form-section">
        <h3><span class="sec-icon">📍</span>Billing Address</h3>
        <div class="form-grid full">
          <div class="form-group">
            <label>Street Address</label>
            <input type="text" placeholder="123 Main Street">
          </div>
        </div>
        <div class="form-grid" style="margin-top:16px;">
          <div class="form-group">
            <label>City</label>
            <input type="text" placeholder="New York">
          </div>
          <div class="form-group">
            <label>State / Province</label>
            <input type="text" placeholder="NY">
          </div>
          <div class="form-group">
            <label>ZIP / Postal Code</label>
            <input type="text" placeholder="10001">
          </div>
          <div class="form-group">
            <label for="country-select">Country</label>
            <select id="country-select">
              <option>United States</option>
              <option>United Kingdom</option>
              <option>Canada</option>
              <option>Australia</option>
              <option>Ghana</option>
              <option>Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Payment -->
      <div class="form-section">
        <h3><span class="sec-icon">💳</span>Payment Method</h3>
        <div class="payment-icons">
          <div class="pay-icon active">💳 Card</div>
          <div class="pay-icon">PayPal</div>
          <div class="pay-icon">Apple Pay</div>
          <div class="pay-icon">Google Pay</div>
        </div>
        <div class="form-grid full">
          <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456" maxlength="19">
          </div>
        </div>
        <div class="card-fields" style="margin-top:16px;">
          <div class="form-group" style="flex:1;">
            <label>Expiry Date</label>
            <input type="text" placeholder="MM / YY" maxlength="7">
          </div>
          <div class="form-group" style="flex:1;">
            <label>CVV</label>
            <input type="text" placeholder="•••" maxlength="4">
          </div>
        </div>
      </div>

      <button class="place-order-btn" onclick="placeOrder()">🔒 Place Order &amp; Pay</button>
    </div>

    <!-- Order Summary Sidebar -->
    <div class="checkout-summary">
      <div class="cart-summary">
        <h2>Order Summary</h2>
        <div id="checkout-mini-cart"></div>
        <div style="height:1px;background:#f0f1fa;margin:16px 0;"></div>
        <div id="checkout-summary-rows"></div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="checkout-total-display">₵0.00</span>
        </div>
        <div class="secure-note" style="margin-top:16px;">🔒 256-bit SSL encryption</div>
      </div>
    </div>

  </div>
</div>
