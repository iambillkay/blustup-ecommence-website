<!-- ═══════════════════════════════════════
     pages/success.html — Order Success Page
     Included inside #page-success in index.html
════════════════════════════════════════ -->

<div class="success-card">
  <div class="success-icon">✓</div>
  <h1>Order Confirmed!</h1>
  <p>Thank you for booking with AirLume.AI. Your travel details have been sent to your email. Safe travels! ✈</p>
  <div class="success-ref">
    Order Reference: <span id="order-ref">#AIR-00000</span>
  </div>
  <button
    class="btn-primary"
    style="width:100%;padding:14px;font-size:.95rem;"
    onclick="showPage('home')"
  >
    ← Back to Home
  </button>
  <button
    style="width:100%;padding:14px;font-size:.95rem;margin-top:12px;background:none;border:1.5px solid #e0e3f5;border-radius:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;color:var(--text-dark);"
    onclick="showPage('shop')"
  >
    Continue Shopping
  </button>
</div>
