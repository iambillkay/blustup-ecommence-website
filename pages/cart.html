<!-- ═══════════════════════════════════════
     pages/cart.html — Cart Page Content
     Included inside #page-cart in index.html
════════════════════════════════════════ -->

<div class="cart-container">
  <h1>Your Cart 🛒</h1>

  <div class="cart-layout">

    <!-- Cart Items -->
    <div>
      <div class="cart-items" id="cart-items-container"></div>
      <div id="empty-cart" style="display:none;text-align:center;padding:60px 0;color:var(--text-light);">
        <div style="font-size:56px;margin-bottom:16px;">🛒</div>
        <p style="font-size:1.1rem;font-weight:600;color:var(--text-dark);">Your cart is empty</p>
        <p style="margin-top:8px;font-size:.9rem;">Discover amazing travel deals in our shop</p>
        <button class="btn-primary" style="margin-top:24px;" onclick="showPage('shop')">Browse Shop →</button>
      </div>
    </div>

    <!-- Order Summary -->
    <div class="cart-summary">
      <h2>Order Summary</h2>
      <div id="cart-summary-rows"></div>
      <div class="promo-input">
        <input type="text" placeholder="Promo code" id="promo-input">
        <button onclick="applyPromo()">Apply</button>
      </div>
      <div class="summary-row total">
        <span>Total</span>
        <span id="cart-total-display">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="showPage('checkout')">Proceed to Checkout →</button>
      <div class="secure-note">🔒 Secure &amp; encrypted checkout</div>
    </div>

  </div>
</div>
